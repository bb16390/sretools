syntax = "proto3";

package worker;

service WorkerService {
  rpc RegisterWorker(RegisterRequest) returns (RegisterResponse) {}
  rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse) {}
  rpc SendLogs(stream LogEntry) returns (SendLogsResponse) {}
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse) {}
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {}
}

message WorkerInfo {
  string version = 1;
  string host = 2;
  int32 port = 3;
  double timestamp = 4;
}

message RegisterRequest {
  string worker_id = 1;
  WorkerInfo info = 2;
  string signature = 3;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
  string worker_id = 3;
  map<string, string> config = 4;
  double timestamp = 5;
}

message HeartbeatRequest {
  string worker_id = 1;
  string status = 2;
  double timestamp = 3;
  string signature = 4;
}

message HeartbeatResponse {
  bool success = 1;
  string message = 2;
  double timestamp = 3;
}

message LogEntry {
  string worker_id = 1;
  string level = 2;
  string message = 3;
  string source = 4;
  double timestamp = 5;
  map<string, string> metadata = 6;
}

message SendLogsResponse {
  bool success = 1;
  string message = 2;
  int32 received_count = 3;
  double timestamp = 4;
}

message GetConfigRequest {
  string worker_id = 1;
}

message GetConfigResponse {
  bool success = 1;
  map<string, string> config = 2;
  double timestamp = 3;
}

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
  }
  ServingStatus status = 1;
  double timestamp = 2;
}
